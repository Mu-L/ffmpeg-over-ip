name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            goos: linux
            goarch: amd64
            ffmpeg_target: linux64
            ext: ""
          - platform: linux-arm64
            goos: linux
            goarch: arm64
            ffmpeg_target: linuxarm64
            ext: ""
          - platform: windows-amd64
            goos: windows
            goarch: amd64
            ffmpeg_target: win64
            ext: ".exe"
          - platform: macos-arm64
            goos: darwin
            goarch: arm64
            ffmpeg_target: macarm64
            ext: ""
          - platform: macos-amd64
            goos: darwin
            goarch: amd64
            ffmpeg_target: mac64
            ext: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare licenses
        run: |
          cp LICENSE.md LICENSE
          cp third_party/jellyfin-ffmpeg/LICENSE.md LICENSE.ffmpeg

      - name: Build Go binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ffmpeg-over-ip-client${{ matrix.ext }} ./cmd/client
          go build -trimpath -ldflags="-s -w" \
            -o ffmpeg-over-ip-server${{ matrix.ext }} ./cmd/server

      - name: Extract ffmpeg binaries
        run: |
          mkdir -p ffmpeg-bin
          ARCHIVE=$(ls artifacts/*_${{ matrix.ffmpeg_target }}-gpl.*)
          case "$ARCHIVE" in
            *.tar.xz) tar xf "$ARCHIVE" -C ffmpeg-bin ;;
            *.zip)    unzip -q "$ARCHIVE" -d ffmpeg-bin ;;
          esac

      - name: Package archives
        env:
          PLATFORM: ${{ matrix.platform }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          mkdir -p dist client-staging server-staging

          cp "ffmpeg-over-ip-client${EXT}" client-staging/
          cp LICENSE LICENSE.ffmpeg client-staging/

          cp "ffmpeg-over-ip-server${EXT}" server-staging/
          cp "ffmpeg-bin/ffmpeg${EXT}" server-staging/
          cp "ffmpeg-bin/ffprobe${EXT}" server-staging/
          cp LICENSE LICENSE.ffmpeg server-staging/

          # Naming MUST stay <platform>-ffmpeg-over-ip-<role>.zip — the
          # install scripts (scripts/install-{client,server}.{sh,ps1})
          # fetch this exact URL from /releases/latest/download/.
          client_name="${PLATFORM}-ffmpeg-over-ip-client"
          server_name="${PLATFORM}-ffmpeg-over-ip-server"
          (cd client-staging && zip -r "../dist/${client_name}.zip" .)
          (cd server-staging && zip -r "../dist/${server_name}.zip" .)
          (cd dist \
            && sha256sum "${client_name}.zip" > "${client_name}.zip.sha256" \
            && sha256sum "${server_name}.zip" > "${server_name}.zip.sha256")

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-over-ip-${{ matrix.platform }}
          path: |
            dist/${{ matrix.platform }}-ffmpeg-over-ip-client.zip
            dist/${{ matrix.platform }}-ffmpeg-over-ip-client.zip.sha256
            dist/${{ matrix.platform }}-ffmpeg-over-ip-server.zip
            dist/${{ matrix.platform }}-ffmpeg-over-ip-server.zip.sha256
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ffmpeg-over-ip-*
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-ffmpeg-over-ip-*.zip
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
